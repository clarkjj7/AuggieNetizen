<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auggie Netizen</title>
  <link rel="stylesheet" href="style.css">

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #16161C;
      font-family: Arial, Helvetica, sans-serif;
      color: #44444b;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #login-container {
      width: 100%;
      max-width: 360px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }
    #title { font-size: 26px; letter-spacing: 0.5px; color: #e2e2ff; }
    #title span { color: #fca5a5; }
    #login-form {
      width: 100%;
      background: #1E1E26;
      border: 1px solid rgba(226, 226, 255, 0.08);
      border-radius: 16px;
      padding: 24px 20px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #login-form input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(226, 226, 255, 0.15);
      background: #16161C;
      color: #8e8e9f;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }
    #login-form input::placeholder { color: #9d9dad; }
    #login-form input:focus { border-color: rgba(136, 19, 19, 0.6); }
    #login-buttons { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    #login-button {
      width: 100%;
      padding: 11px;
      border-radius: 10px;
      border: 1px solid rgba(136, 19, 19, 0.5);
      background: rgba(136, 19, 19, 0.35);
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    #login-button:hover { background: rgba(136, 19, 19, 0.55); border-color: rgba(136, 19, 19, 0.75); }
    #login-button:disabled { opacity: 0.5; cursor: not-allowed; }
    #login-form p { text-align: center; color: #9d9dad; font-size: 13px; }
    #login-form p button { background: none; border: none; padding: 0; cursor: pointer; }
    #login-form p button a { color: #fca5a5; text-decoration: none; font-size: 13px; }
    #login-form p button a:hover { text-decoration: underline; }
    #error-message { color: #fca5a5; font-size: 12px; text-align: center; min-height: 16px; }
  </style>
</head>
<body>

  <div id="login-container">
    <h1 id="title">Auggie <span>Netizen</span></h1>

    <div id="login-form">
      <input type="email" id="email" placeholder="username@augsburg.edu" autocomplete="email" required>
      <input type="password" id="password" placeholder="********" required>

      <div id="login-buttons">
        <button id="login-button">Login</button>
      </div>

      <p>Don't have an account? <button><a href="register.html">Register</a></button></p>
      <p id="error-message"></p>
    </div>
  </div>

  <script>
    const SUPABASE_URL  = 'https://tqdizldvweawdiynscot.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxZGl6bGR2d2Vhd2RpeW5zY290Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMzMwOTEsImV4cCI6MjA4ODkwOTA5MX0.Z6EEj9W-8QeTtbFgX1pmiiHVWJX_T2z6st_DGt9KJrM';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    document.getElementById('login-button').addEventListener('click', async () => {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('error-message');
      const btn      = document.getElementById('login-button');

      errEl.textContent = '';

      if (!email || !password) {
        errEl.textContent = 'Please fill in all fields.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logging in…';

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      btn.disabled = false;
      btn.textContent = 'Login';

      if (error) {
        errEl.textContent = error.message;
      } else {
        
        window.location.href = 'profile.html'; 
      }
    });
  </script>

</body>
</html>
