<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report</title>

  <style>

    /* ── base: matches profile/feed body exactly ── */
    body { margin: 0; background: #16161C; color: white; font-family: Arial, Helvetica, sans-serif; }

    /* ── app wrapper: full width, no padding ── */
    .app { width: 100%; margin: 0; padding: 0; }

    /* ── top nav wrapper: same margin as profile/feed ── */
    .top-nav-wrapper {
      position: relative;
      margin: 14px 14px 0 14px;
      z-index: 1200;
    }

    /* ── nav pill bar: same style as profile/feed ── */
    .top-nav-links {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin: 0;
      padding: 10px 12px;
      background: rgba(22, 22, 28, 0.97);
      border: 1px solid rgba(226, 226, 255, 0.1);
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
      list-style: none;
    }

    /* ── each nav item takes equal space ── */
    .top-nav-links .nav-item { display: flex; flex: 1; min-width: 0; }

    /* ── nav link default state ── */
    .top-nav-links .nav-link {
      color: #e2e2ff;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 14px;
      text-align: center;
      width: 100%;
      border: 1px solid transparent;
      text-decoration: none;
    }

    /* ── nav link hover ── */
    .top-nav-links .nav-link:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.12);
    }

    /* ── active nav link: purple highlight matching profile/feed ── */
    .top-nav-links .nav-link.active {
      background: rgba(122, 122, 255, 0.22);
      border-color: rgba(180, 180, 255, 0.35);
      color: #ffffff;
    }

    /* ── hamburger button (hidden on desktop, shown on mobile) ── */
    .hamburger-btn {
      display: none;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(226, 226, 255, 0.2);
      border-radius: 10px;
      background: #16161C;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
      padding: 0;
    }

    /* ── hamburger lines ── */
    .hamburger-btn span {
      display: block;
      width: 18px;
      height: 2px;
      background: #e2e2ff;
      transition: 0.2s ease;
    }

    /* ── hamburger animates into X when open ── */
    .hamburger-btn.active span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .hamburger-btn.active span:nth-child(2) { opacity: 0; }
    .hamburger-btn.active span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    /* ── report content area: same padding/max-width as profile ── */
    .report-content {
      padding: 16px;
      max-width: 720px;
      margin: 0 auto;
    }

    /* ── page heading: matches profile subheader style ── */
    .report-content h2 {
      color: #9ca3af;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    /* ── section label above each group ── */
    .section-label {
      color: #9ca3af;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── incident type options row ── */
    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    /* ── each type pill: matches feed filter-btn style ── */
    .option {
      background: #22232c;
      color: #d1d5db;
      border: 1px solid #303244;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: 0.2s ease;
      white-space: nowrap;
    }

    /* ── selected option: report.js adds/removes .selected class ── */
    .option.selected {
      background: #3d1519;
      color: #ffb4b4;
      border-color: rgba(185, 28, 28, 0.5);
    }

    .option:hover {
      background: #2a2b36;
      color: #ffffff;
    }

    /* ── description card: same card style as profile cards ── */
    .description-card {
      background: #1d1e27;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 14px;
    }

    /* ── title input inside card ── */
    .description-card input {
      width: 100%;
      background: transparent;
      border: none;
      color: #e2e2ff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      outline: none;
    }

    .description-card input::placeholder { color: #9ca3af; }

    /* ── severity dropdown inside card ── */
    .description-card select {
      width: 100%;
      background: transparent;
      border: none;
      color: #e2e2ff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }

    .description-card select option { background: #1d1e27; }

    /* ── textarea inside the card ── */
    .description-card textarea {
      width: 100%;
      background: transparent;
      border: none;
      color: #e2e2ff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      outline: none;
      min-height: 100px;
    }

    .description-card textarea::placeholder { color: #9ca3af; }

    /* ── location card: same card style ── */
    .location-card {
      background: #1d1e27;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .location-card input {
      background: transparent;
      border: none;
      color: #e2e2ff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      outline: none;
      flex: 1;
    }

    .location-card input::placeholder { color: #9ca3af; }

    /* ── location icon dot ── */
    .location-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ffb4b4;
      flex-shrink: 0;
    }

    /* ── submit button: maroon, matches edit-btn style ── */
    #submit {
      width: 100%;
      padding: 13px;
      border-radius: 14px;
      border: 1px solid rgba(136, 19, 19, 0.5);
      background: rgba(136, 19, 19, 0.35);
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s ease;
      letter-spacing: 0.5px;
    }

    #submit:hover { background: rgba(136, 19, 19, 0.55); }

    /* ── mobile: show hamburger, stack nav vertically ── */
    @media (max-width: 768px) {
      .hamburger-btn { display: inline-flex; }
      .top-nav-links {
        display: none;
        flex-direction: column;
        width: 100%;
        margin-top: 8px;
        padding: 10px;
        gap: 6px;
      }
      .top-nav-links.show-mobile-nav { display: flex; }
      .top-nav-links .nav-item { width: 100%; flex: initial; }
      .top-nav-links .nav-link { width: 100%; text-align: left; padding: 10px 12px; }
    }

  </style>
</head>
<body>

<div class="app">

  <!-- top navigation: same structure as profile/feed -->
  <div class="top-nav-wrapper">
    <button class="hamburger-btn" id="hamburgerBtn" type="button" aria-label="Toggle navigation" aria-expanded="false" aria-controls="pills-tab">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul class="top-nav-links" id="pills-tab" role="tablist">
      <li class="nav-item"><a class="nav-link" href="map.html">Map</a></li>
      <li class="nav-item"><a class="nav-link" href="feed.html">Feed</a></li>
      <li class="nav-item"><a class="nav-link active" href="report.html">Report</a></li>
      <li class="nav-item"><a class="nav-link" href="alerts.html">Alerts</a></li>
      <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
    </ul>
  </div>

  <!-- report form -->
  <div class="report-content">

    <h2>REPORT INCIDENT</h2>

    <!-- incident type pills — report.js reads .option.selected's data-type -->
    <div class="section-label">Type of Incident</div>
    <div class="options">
      <span class="option selected" data-type="suspicious_activity">Suspicious</span>
      <span class="option" data-type="fire">Fire</span>
      <span class="option" data-type="medical">Medical</span>
      <span class="option" data-type="car_accident">Accident</span>
      <span class="option" data-type="break_in">Break-in</span>
      <span class="option" data-type="other">Other</span>
    </div>

    <!-- title — report.js reads id="title" (required) -->
    <div class="section-label">Title</div>
    <div class="description-card">
      <input type="text" id="title" placeholder="Short title for the incident...">
    </div>

    <!-- description — report.js reads id="description" (optional) -->
    <div class="section-label">Description</div>
    <div class="description-card">
      <textarea id="description" placeholder="Describe what you see..."></textarea>
    </div>

    <!-- severity — report.js reads id="severity" dropdown value -->
    <div class="section-label">Severity</div>
    <div class="description-card">
      <select id="severity">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
    </div>

    <!-- submit — report.js listens for click on id="submit" -->
    <div id="submit">SUBMIT REPORT</div>

  </div>
</div>

<!--  -->
<script type="module" src="report.js"></script>

<!-- hamburger  -->
<script>
  const hamburgerBtn = document.getElementById("hamburgerBtn");
  const topNav = document.getElementById("pills-tab");
  hamburgerBtn.addEventListener("click", () => {
    const isOpen = topNav.classList.toggle("show-mobile-nav");
    hamburgerBtn.classList.toggle("active", isOpen);
    hamburgerBtn.setAttribute("aria-expanded", String(isOpen));
  });
</script>

</body>
</html>
