<!DOCTYPE html>
<html lang="en">
<head>
     <!--boostrap stylesheet -->
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
     <!--leaflet stylesheet-->
     <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
     
     <!-- font awesome for bottom nav icons -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

     <!--
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/css-device-frames@1/dist/device-frames.min.css">
    <link rel="stylesheet" href="path/to/device-frames.css">
     -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>AuggieNetizen</title>
    <link rel="stylesheet" href="mapStyle.css">
</head>

<body>
<!-- TODO: Ask afiya to cobfrm incidents stuff:
1) incidents table has rows
 -->
<!-- the app framework where everything is in -->
<div class="container">
     <div class="top-nav-wrapper">
          <button class="hamburger-btn" id="hamburgerBtn" type="button" aria-label="Toggle navigation" aria-expanded="false" aria-controls="pills-tab">
               <span></span>
               <span></span>
               <span></span>
          </button>
          <ul class="top-nav-links" id="pills-tab" role="tablist">
               <!--The map view page-->
               <li class="nav-item ">
                    <a class = "nav-link active" id = "map-home-tab" data-toggle = "map" role = "tab" aria-controls = "map-home" aria-selected= "true" href ="map.html">Map</a>
               </li>
               <!--The feed page -->
               <li class = "nav-item">
                    <a class = "nav-link" id = "incident-feed-tab" data-toggle = "feed" role = "tab" aria-controls = "incident-feed" aria-selected= "true" href ="feed.html">Feed</a>
               </li>
               <!--The report page-->
               <li class = "nav-item">
                    <a class = "nav-link" id = "incident-feed-tab" data-toggle = "feed" role = "tab" aria-controls = "incident-feed" aria-selected= "true" href ="map.html">Report</a>
               </li>
               <!--the alerts page-->
               <li class = "nav-item">
                    <a class = "nav-link" id = "incident-feed-tab" data-toggle = "feed" role = "tab" aria-controls = "incident-feed" aria-selected= "true" href ="map.html">Alerts</a>
               </li>
               <!--The profile tab-->
               <li class = "nav-item">
                    <a class = "nav-link" id = "incident-feed-tab" data-toggle = "feed" role = "tab" aria-controls = "incident-feed" aria-selected= "true" href ="profile.html">Profile</a>
               </li>
          </ul>
     </div>
     
     <div id="map">
          <!-- searchbar inside map-->
          <nav class="navbar">
          </nav>

          <div class="search-container">
               <input class="searchbar" type="text" placeholder="search campus..">
          </div>
     </div>

     <!-- This is where the box starts-->
     <div class="nearby-sheet">
          <div class="sheet-handle"></div>

          <div class="sheet-header">
               <h3>RECENT INCIDENTS</h3>
               <p class="sheet-subtitle">Newest incidents first</p>
          </div>

          <!--changes to recent incidents insead -->
          <div class="incident-list" id="incidentList">
               <!-- incidents will be added here by javascript -->
          </div>

     </div>
</div>

<!-- Script for leaflet and the map.js file and js files for boostrap  -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

<script src="map.js"></script>
<script>
     const hamburgerBtn = document.getElementById("hamburgerBtn");
     const topNav = document.getElementById("pills-tab");

     hamburgerBtn.addEventListener("click", () => {
          const isOpen = topNav.classList.toggle("show-mobile-nav");
          hamburgerBtn.classList.toggle("active", isOpen);
          hamburgerBtn.setAttribute("aria-expanded", String(isOpen));
     });
</script>
</body>
</html>
